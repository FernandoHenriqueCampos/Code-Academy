<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Axios</title>
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
     <header>
        <h1>CRUD Project - Using Axios</h1>
        <button class="console-toggle" id="consoleToggle" onclick="toggleConsole()">
            <span class="toggle-indicator"></span>
            console
        </button>
    </header>
    <main>
 
        <section class="usersShow">
            <h1><span>Users</span></h1>
            <div id="cards" class="cards"></div>
        </section>
 
        <section class="postPutUser">
            <h1 id="EditCreate"><span>Create User</span></h1>
            <form action="">
                <div class="Input">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>
 
                <div class="Input">
                    <label for="age">Age</label>
                    <input type="number" id="age" placeholder="25">
                </div>
 
                <div class="Input">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>
 
                <div class="form-actions">
                    <button id="createButton" type="button" onclick="postButtonUser()">Create</button>
                    <button id="updateButton" type="button" class="updateButton edit" onclick="handleUpdateClick()">Update</button>
                    <button id="cancelButton" type="button" class="cancelButton edit" onclick="cancelDisplayButton()">Cancel</button>
                </div>
            </form>
        </section>

        <section class="console-panel">
            <div class="console-header">
                <div class="console-dots">
                    <span class="dot dot-red"></span>
                    <span class="dot dot-yellow"></span>
                    <span class="dot dot-green"></span>
                </div>
                <span class="console-title">bash — http requests</span>
                <button class="console-clear" onclick="clearConsole()">clear</button>
            </div>
            <div class="console-body">
                <div id="console-output"></div>
            </div>
        </section>
 
    </main>
    <script type="module" src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.console-panel').style.display = 'none';
        });
    </script>
</body>
</html>
